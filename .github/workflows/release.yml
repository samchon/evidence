name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  publish:
    name: Verify and publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout evidence-graph
        uses: actions/checkout@v4
        with:
          path: samchon/evidence-graph

      - name: Checkout ttsc
        uses: actions/checkout@v4
        with:
          repository: samchon/ttsc
          ref: v0.20.0
          path: samchon/ttsc

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org/
          cache: pnpm
          cache-dependency-path: samchon/evidence-graph/pnpm-lock.yaml

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: samchon/evidence-graph/packages/evidence-graph/go.mod
          cache-dependency-path: samchon/evidence-graph/packages/evidence-graph/go.sum

      - name: Install dependencies
        working-directory: samchon/evidence-graph
        run: pnpm install --frozen-lockfile

      - name: Test
        working-directory: samchon/evidence-graph
        run: pnpm test

      - name: Publish to npm
        working-directory: samchon/evidence-graph
        run: pnpm run package:latest --no-git-checks --provenance

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - name: Generate release notes
        run: pnpm dlx changelogithub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
