name: test

on:
  # Master runs the suite too, because a pull request only ever proves the
  # branch agrees with the base it was cut from. Two changes that never touch
  # the same lines merge clean and green while one deletes a module the other
  # imports, and nothing notices until the next full run.
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  Test:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout lint-plugin-evidence
        uses: actions/checkout@v4
        with:
          path: samchon/lint-plugin-evidence

      - name: Checkout ttsc
        uses: actions/checkout@v4
        with:
          repository: samchon/ttsc
          ref: v0.20.0
          path: samchon/ttsc

      - uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - uses: actions/setup-go@v5
        with:
          go-version: 1.26.x

      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.4

      - name: Install Dependencies
        working-directory: samchon/lint-plugin-evidence
        run: pnpm install --frozen-lockfile

      - name: Run Tests
        working-directory: samchon/lint-plugin-evidence
        run: pnpm test
