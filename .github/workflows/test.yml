name: test

on:
  pull_request:
  workflow_dispatch:

jobs:
  Test:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout lint-plugin-evidence
        uses: actions/checkout@v4
        with:
          path: samchon/lint-plugin-evidence

      - name: Checkout ttsc
        uses: actions/checkout@v4
        with:
          repository: samchon/ttsc
          ref: v0.20.0
          path: samchon/ttsc

      - uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - uses: actions/setup-go@v5
        with:
          go-version: 1.26.x

      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.4

      - name: Install Dependencies
        working-directory: samchon/lint-plugin-evidence
        run: pnpm install --frozen-lockfile

      - name: Run Tests
        working-directory: samchon/lint-plugin-evidence
        run: pnpm test
